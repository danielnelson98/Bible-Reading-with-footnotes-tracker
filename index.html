<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <title>Bible Reading Tracker – OT & NT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0; padding: 0;
      background: #f5f5f5; color: #222;
    }
    header {
      padding: 16px; background: #283593; color: #fff; text-align: center;
    }
    header h1 { margin: 0; font-size: 1.4rem; }
    .nav {
      padding: 8px 12px; background: #e8eaf6;
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
      font-size: 0.85rem;
    }
    .nav button {
      border: none; padding: 6px 10px; border-radius: 999px;
      background: #3949ab; color: #fff; cursor: pointer; font-size: 0.8rem;
    }
    .nav button:hover { background: #303f9f; }
    .container {
      display: flex; flex-wrap: wrap; gap: 12px;
      padding: 12px; box-sizing: border-box;
    }
    .column { flex: 1 1 320px; min-width: 0; }
    .column h2 { margin: 4px 0 8px; font-size: 1.1rem; text-align: center; }
    .weeks {
      max-height: calc(100vh - 150px);
      overflow-y: auto; padding-right: 4px;
    }
    .week {
      background: #ffffff; margin-bottom: 10px; border-radius: 8px;
      padding: 10px 10px 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .week-header {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 6px; gap: 6px;
    }
    .week-title { font-weight: 600; font-size: 0.95rem; }
    .week-dates { font-size: 0.8rem; color: #555; text-align: right; }
    .day {
      display: flex; align-items: center; font-size: 0.85rem; margin: 2px 0;
    }
    .day input[type="checkbox"] { width: 16px; height: 16px; }
    .day label { margin-left: 6px; }
    footer {
      text-align: center; font-size: 0.75rem; color: #777;
      padding: 8px 0 10px;
    }
    @media (max-width: 700px) { .weeks { max-height: none; } }
  </style>
</head>

      1: ["Matt 1:1–2:8", "1:3–7", "1:8–17", "1:18–25", "2:1–23", "3:1–6", "3:7–17"],

      3: ["6:1–8", "6:9–19", "6:19–34", "7:1–12", "7:13–29", "8:1–4", "8:1–22"],
      4: ["8:23–34", "9:1–13", "9:14–17", "9:18–34", "9:35–10:5", "10:6–25", "10:26–42"],
      5: ["11:1–15", "11:16–30", "12:1–14", "12:15–32", "12:33–42", "12:43–13:12", "13:13–32"],
      // ...continue NT 6–26 from that table
      // ...then NT 27–52, 53–78, 79–104 from the other NT tables
    };

    function formatDate(d) {
      const day = d.getDate();
      const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      return `${day} ${monthNames[d.getMonth()]} ${d.getFullYear()}`;
    }

    function createWeeks(container, prefix, refs) {
      for (let w = 1; w <= NUM_WEEKS; w++) {
        const weekDiv = document.createElement('div');
        weekDiv.className = 'week';
        weekDiv.id = `${prefix}-week-${w}`;

        const header = document.createElement('div');
        header.className = 'week-header';

        const title = document.createElement('div');
        title.className = 'week-title';
        title.textContent = `Week ${w}`;

        const start = new Date(START_DATE.getTime() + (w - 1) * 7 * 86400000);
        const end = new Date(start.getTime() + 6 * 86400000);

        const dates = document.createElement('div');
        dates.className = 'week-dates';
        dates.textContent = `${formatDate(start)} – ${formatDate(end)}`;

        header.appendChild(title);
        header.appendChild(dates);
        weekDiv.appendChild(header);

        dayNames.forEach((name, idx) => {
          const dayDiv = document.createElement('div');
          dayDiv.className = 'day';

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          const key = `${prefix}-w${w}-d${idx}`;
          checkbox.id = key;

          if (w <= 9) {
            checkbox.checked = true;
            localStorage.setItem(key, '1');
          } else {
            const saved = localStorage.getItem(key);
            if (saved === '1') checkbox.checked = true;
          }

          checkbox.addEventListener('change', () => {
            if (checkbox.checked) localStorage.setItem(key, '1');
            else localStorage.removeItem(key);
          });

          const label = document.createElement('label');
          label.htmlFor = key;

          const ref = refs[w] && refs[w][idx] ? refs[w][idx] : "";
          label.textContent = ref ? `${name} — ${ref}` : name;

          dayDiv.appendChild(checkbox);
          dayDiv.appendChild(label);
          weekDiv.appendChild(dayDiv);
        });

        container.appendChild(weekDiv);
      }
    }

    createWeeks(document.getElementById('ot-weeks'), 'ot', otRefs);
    createWeeks(document.getElementById('nt-weeks'), 'nt', ntRefs);

    document.querySelectorAll('.nav button[data-jump]').forEach(btn => {
      btn.addEventListener('click', () => {
        const week = parseInt(btn.getAttribute('data-jump'), 10);
        const target = document.getElementById(`ot-week-${week}`);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
  </script>
